# Netlify configuration for OraQuest (static single-file SPA)
# Generated by tools/_gen-netlify.js — keep route list in sync with ROUTE_PATHS.

[build]
  # No build step — the site is plain HTML/CSS/PNG served from the repo root.
  publish = "."

# Explicit Content-Type for crawler/SEO files (some setups mis-serve .xml/.txt).
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/sitemap.xsl"
  [headers.values]
    Content-Type = "text/xsl; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Thin / "coming soon" routes (store, teams, blog) — EN/ES/FR. Served 200 but
# kept out of the index via an X-Robots-Tag header (defense-in-depth alongside
# the runtime <meta name="robots"> the SPA injects). Excluded from sitemap.xml.
[[headers]]
  for = "/store"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/es/tienda"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/fr/boutique"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/oraquest/teams"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/es/oraquest/equipos"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/fr/oraquest/equipes"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/oraquest/blog"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/es/oraquest/blog"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/fr/oraquest/blog"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/report"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/es/reportar"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/fr/signaler"
  [headers.values]
    X-Robots-Tag = "noindex"

# ----------------------------------------------------------------------------
# Static files (robots.txt, sitemap.xml, ads.txt, /assets/*, tailwind.css,
# OraQuest.html) are served as real files: Netlify matches existing files
# before applying these redirects (force = false, the default), so none of the
# rules below can swallow them.
# ----------------------------------------------------------------------------

# 1) Legacy aliases -> canonical paths (301, permanent).
[[redirects]]
  from = "/shop"
  to = "/store"
  status = 301

