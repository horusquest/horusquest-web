<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, follow" />
<title>Page not found — HorusQuest</title>
<meta name="description" content="The page you were looking for could not be found. Head back to HorusQuest to keep playing, guessing and learning with Ora." />
<link rel="icon" type="image/png" href="/assets/ora.png" />
<style>
  :root { --violet:#7C3AED; --sky:#38BDF8; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    min-height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:2rem;
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    color:#fff; text-align:center;
    background:linear-gradient(160deg,var(--violet) 0%,var(--sky) 100%);
  }
  .card { max-width:32rem; }
  img.owl { width:160px; height:auto; filter:drop-shadow(0 10px 25px rgba(0,0,0,.25)); }
  h1 { font-size:3.5rem; margin:1rem 0 .25rem; font-weight:800; letter-spacing:-.02em; }
  h2 { font-size:1.4rem; margin:0 0 .5rem; font-weight:700; }
  p { font-size:1rem; line-height:1.6; opacity:.95; margin:0 auto 1.75rem; max-width:26rem; }
  a.btn {
    display:inline-block; background:#fff; color:var(--violet);
    font-weight:700; text-decoration:none;
    padding:.85rem 1.75rem; border-radius:9999px;
    box-shadow:0 8px 20px rgba(0,0,0,.18);
    transition:transform .15s ease;
  }
  a.btn:hover { transform:translateY(-2px); }
  .brand { margin-top:2rem; font-size:.8rem; text-transform:uppercase; letter-spacing:.12em; opacity:.85; }
</style>
</head>
<body>
  <main class="card">
    <img class="owl" src="/assets/ora.png" alt="Ora, the wise HorusQuest owl, looking puzzled" />
    <h1>404</h1>
    <h2>This page flew away</h2>
    <p>Ora couldn&rsquo;t find the page you were looking for. It may have moved, or the link might be incorrect.</p>
    <a class="btn" href="/">Back to HorusQuest</a>
    <div class="brand">HorusQuest &mdash; learn &amp; play with Ora</div>
  </main>
</body>
</html>
